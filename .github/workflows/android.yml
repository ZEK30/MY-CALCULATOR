name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Init Bubblewrap project
        run: |
          yes "n" | bubblewrap init --manifest https://zek30.github.io/MY-CALCULATOR/manifest.json --skipPwaValidation

      - name: Build APK
        run: |
          yes "" | bubblewrap build --skipSigning

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CALCULATOR-APK
          path: ./*.apk
