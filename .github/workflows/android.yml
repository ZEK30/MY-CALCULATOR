name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap non-interactive
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'EOF'
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Init Bubblewrap project
        run: |
          bubblewrap init \
            --manifest https://zek30.github.io/MY-CALCULATOR/manifest.json \
            --skipPwaValidation \
            --jdkPath "$JAVA_HOME" \
            --androidSdkPath "$ANDROID_HOME"
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build APK
        run: bubblewrap build --skipSigning

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CALCULATOR-APK
          path: ./*.apk
