name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Create Bubblewrap config to skip JDK prompt
        run: |
          mkdir -p ~/.bubblewrap
          echo '{
            "jdkPath": "'$JAVA_HOME'",
            "androidSdkPath": "'$ANDROID_HOME'"
          }' > ~/.bubblewrap/config.json

      - name: Create twa-manifest.json manually
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "com.zek30.mycalculator",
            "host": "zek30.github.io",
            "name": "MY-CALCULATOR",
            "launcherName": "Calculator",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#ffffff",
            "startUrl": "/MY-CALCULATOR/",
            "iconUrl": "https://zek30.github.io/MY-CALCULATOR/icon-512.png",
            "maskableIconUrl": "https://zek30.github.io/MY-CALCULATOR/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "android.keystore",
              "alias": "android"
            },
            "enableNotifications": false,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://zek30.github.io/MY-CALCULATOR/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": false,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "minSdkVersion": 19,
            "orientation": "default",
            "fingerprints": []
          }
          EOF

      - name: Build APK with Bubblewrap
        run: bubblewrap build --skipSigning

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CALCULATOR-APK
          path: ./*.apk
