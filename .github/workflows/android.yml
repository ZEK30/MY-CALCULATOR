name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build APK via PWABuilder API
        run: |
          curl -X POST "https://pwabuilder-apk.azurewebsites.net/generateApk" \
            -H "Content-Type: application/json" \
            -d '{
              "url": "https://zek30.github.io/MY-CALCULATOR/",
              "packageId": "com.zek30.mycalculator",
              "name": "MY-CALCULATOR",
              "launcherName": "Calculator",
              "themeColor": "#000000",
              "backgroundColor": "#ffffff",
              "startUrl": "/",
              "iconUrl": "https://zek30.github.io/MY-CALCULATOR/icon-512.png"
            }' \
            --output calculator.apk -v

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CALCULATOR-APK
          path: calculator.apk
